/* GIF */
.cat img {
    width: 100%;
    max-width: 180px;
    height: auto;
    object-fit: contain;
    display: block;
    margin: 0 auto 15px;
    border-radius: 20px;
}

/* SCREENS */
.screen {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.active { display: flex; }

.card {
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 25px;
    width: 340px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

/* BUTTONS */
button {
    margin: 10px;
    padding: 12px 25px;
    border-radius: 15px;
    border: none;
    cursor: pointer;
    background: white;
    color: #4facfe;
    font-weight: bold;
}

/* STORY */
.story p {
    opacity: 0;
    transform: translateY(8px);
    animation: fadeIn 0.6s ease forwards;
    margin: 10px 0;
    font-size: 14px;
    text-align: left;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(12px);
        filter: blur(3px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
    }
}

@keyframes show {
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fall {
    from { transform: translateY(-50px); }
    to { transform: translateY(500px); opacity:0; }
}

/* ВЗРЫВ */
.particle{
    position: fixed;
    left: 50%;
    top: 50%;
    font-size: 32px;
    animation: explode 1s forwards;
    pointer-events:none;
}

@keyframes explode {
    0% { transform: translate(-50%, -50%) scale(0); opacity:1; }
    100% {
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y)));
        opacity:0;
    }
}

video {
    width: 100%;
    margin-top: 15px;
    border-radius: 15px;
}
/* эффект появления подарка */
.gift-appear {
    animation: popIn 0.6s ease forwards;
    transform: scale(0);
}

@keyframes popIn {
    0% {
        transform: scale(0);
        opacity: 0;
    }
    70% {
        transform: scale(1.1);
        opacity: 1;
    }
    100% {
        transform: scale(1);
        opacity: 1;
    }
}
.gift-video {
    transform: scale(0.3);
    opacity: 0;
    transition: all 0.6s ease;
}

.gift-video.show {
    transform: scale(1);
    opacity: 1;
}
</style>

</head>

<!-- START -->
<div id="start" class="screen active">
    <div class="card">
        <div class="cat">
            <img src="https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif">
        </div>

        <h2>Ты готов?</h2>

        <button onclick="start()">Да</button>
        <button onclick="no()">Нет</button>
    </div>
</div>

<!-- NO SCREEN -->
<div id="noScreen" class="screen">
    <div class="card">
        <div class="cat">
            <img src="https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif">
        </div>

        <h2>пидора ответ</h2>

        <button onclick="back()">я не такой</button>
        <button onclick="back()">может быть</button>
    </div>
</div>

<!-- STORY -->
<div id="story" class="screen">
    <div class="card">
        <h2>Жыгыттер жыгыттер</h2>

        <div class="story" id="storyText"></div>

        <div id="videoBlock" style="display:none; margin-top:15px;">
            <video id="video" autoplay controls>
                <source src="дастойни.mp4" type="video/mp4">
            </video>
        </div>

        <button onclick="toQuiz()">Дальше</button>
    </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
    <div class="card">
        <h3 id="q"></h3>
        <button onclick="answer(0)" id="a1"></button>
        <button onclick="answer(1)" id="a2"></button>
        <p id="progress"></p>
    </div>
    <button onclick="checkTextAnswer()" id="textBtn" style="display:none;">
    Дальше
</button>
</div>

<script>

/* START STORY */
function startStory(){
    const box = document.getElementById("storyText");
    box.innerHTML = "";

    const lines = [
        "Біздің самый лучший, красавчик достарымыз",
        "Поздравляем вас с 7 мая и желаем всего самого лучшего!",
        "Конечно, мы не могли оставить вас без презента🎁",
        "Но придётся попотеть и доказать, что вы достойны его 😈"
    ];

    let i = 0;

    function next(){
        if(i < lines.length){
            let p = document.createElement("p");
            p.textContent = lines[i];
            box.appendChild(p);
            i++;
            setTimeout(next, 700);
        } else {
            document.getElementById("videoBlock").style.display = "block";
            document.getElementById("video").play();
        }
    }

    next();
}

/* QUIZ */

let quiz = [
    {type:"choice", q:"Кто на свете всех милее,и румянее белее?", a:["Мерей и Жанс, спору нет","Конечно вы қыздар, лучше никого нет"], c:0, c:1},
    {type:"choice", q:"Что вы хотите увидеть в качестве подарка? ", a:["Вы самый лучший подарок","Мы рады любому положительному вашему вниманию"],c:0, c:1},
    {type:"text", q:"С какой птицы нужно ощипать перья чтобы получилось сразу утро, день, вечер и ночь??Напиши просто название без склонений", c:"утка"},
    {type:"text", q:"Когда руки бывают тремя местоимениями?Напиши поставив пропущенное слово -Когда они ...", c:"вымыты"},
    {type:"choice", q:"Как вы думаете мы вас любим и ценим? ", a:["Да","Нет"], c:0, trap:1}
];
let i = 0;

function toQuiz(){
    switchScreen("story","quiz");
    load();
}

function load(){

    let item = quiz[i];

    document.getElementById("progress").textContent = `${i+1}/${quiz.length}`;

    // очистка input если есть
    let oldInput = document.getElementById("textAnswer");
    if(oldInput) oldInput.remove();

    if(item.type === "choice"){

        document.getElementById("q").textContent = item.q;

        document.getElementById("a1").style.display = "inline-block";
        document.getElementById("a2").style.display = "inline-block";

        document.getElementById("a1").textContent = item.a[0];
        document.getElementById("a2").textContent = item.a[1];

    } else {

        document.getElementById("q").textContent = item.q;

        document.getElementById("a1").style.display = "none";
        document.getElementById("a2").style.display = "none";

       let input = document.createElement("input");
input.id = "textAnswer";
input.placeholder = "введите ответ...";
input.style.padding = "10px";
input.style.borderRadius = "10px";
input.style.border = "none";
input.style.marginTop = "10px";
input.style.width = "80%";

document.querySelector("#quiz .card").appendChild(input);
let btn = document.getElementById("textBtn");

if(item.type === "text"){
    btn.style.display = "inline-block";
} else {
    btn.style.display = "none";
}

// КНОПКА ДАЛЬШЕ

    }
}
function checkTextAnswer(){
    answer(null);
}
function answer(x){

    let item = quiz[i];

    // 💀 ЛОВУШКА "Нет"
    if(item.trap !== undefined && x === 1){
        switchScreen("start","noScreen"); // или просто noScreen
        return;
    }
let score = 0;
    // обычные вопросы
    if(item.type === "choice"){

        if(x === item.c) score++;

    } else if(item.type === "text"){

       let input = document.getElementById("textAnswer");
let user = (input?.value || "").toLowerCase().trim();
        let correct = item.c.toLowerCase().trim();

        if(user === correct){
            score++;
        }
    }

    i++;

    if(i >= quiz.length){
        showTrapScreen();
    } else {
        load();
    }
}
/* 🔥 ЛОВУШКА */
function showTrapScreen(){

    document.getElementById("quiz").innerHTML = `
    <div class="card">
        <h2> поймай подарок если сможешь</h2>

        <div style="position:relative;height:180px;">
            <button id="trapBtn"
                style="position:absolute;left:80px;top:60px;">
                🎁 поймай
            </button>
        </div>
    </div>
    `;

    let btn = document.getElementById("trapBtn");

    function move(){
        btn.style.left = Math.random()*200 + "px";
        btn.style.top = Math.random()*120 + "px";
        setTimeout(move, 400);
    }

    btn.onclick = () => {
        showGift();
    };

    move();
}

/* 🎁 ПОДАРОК */
function showGift(){

    document.getElementById("quiz").innerHTML = `
    <div class="card">
        <h2>🎁 СЮРПРИЗ</h2>

        <div id="giftBox" style="
            width:160px;height:160px;
            background:pink;margin:20px auto;
            border-radius:20px;
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;font-size:50px;
            transform:scale(0);
            transition:0.4s ease;
        ">
        🎀
        </div>
    </div>
    `;

    let box = document.getElementById("giftBox");

    // 🔥 появляется из ниоткуда
    setTimeout(()=>{
        box.style.transform = "scale(1)";
    },50);

    box.onclick = openGift;
}

/* 💥 OPEN GIFT */
function openGift(){

    // 🎶 звук
    let audio = new Audio("sparkle.mp3");
    audio.volume = 0.8;
    audio.play();

    // 💥 взрыв из центра (СИЛЬНЫЙ)
    for(let i=0;i<80;i++){

        let p = document.createElement("div");
        p.className = "particle";
        p.innerHTML = "💗";

        let angle = Math.random()*2*Math.PI;
        let dist = 300; // 👈 сильнее разлёт

       p.style.setProperty("--x", Math.cos(angle)*dist+"px");
    p.style.setProperty("--y", Math.sin(angle)*dist+"px");

    p.style.animationDuration = (1.8 + Math.random()*1.5) + "s"; 
    // 👆 медленнее + разный тайминг

document.body.appendChild(p);
setTimeout(()=>p.remove(),3000); // 👈 дольше живут
    }

    // 🎬 задержка → видео появляется как "раскрывшаяся коробка"
    setTimeout(()=>{

        document.getElementById("quiz").innerHTML = `
        <div class="card gift-appear">
            <h2>Поздравляем еще раз с вашим днем ребята, посмотрите видео которое мы подготовили для вас, любим.</h2>

            <video controls>
                <source src="дастойни.mp4" type="video/mp4">
            </video>
        </div>
        `;

    },700);
}

/* SWITCH */
function switchScreen(a,b){
    document.getElementById(a).classList.remove("active");
    document.getElementById(b).classList.add("active");
}

/* START / NO */
function start(){
    switchScreen("start","story");
    startStory();
}

function no(){
    switchScreen("start","noScreen");
}

function back(){
    switchScreen("noScreen","start");
}

;
